# POPE Evaluation Config (LLaVA-1.5)
# Model config
model_name: /path/to/llava-v1.5-7b
precision: bf16


# ECSE subspace parameters
anchor_layer: 26
rank_evidence: 8
rank_prior: 5
kappa: 0.50
lambda_prior: 0.22
eps: 1.0e-6

# Robustification parameters
weight_temp: 1.15
vcr_floor: 0.045
pcr_ceiling: 0.92
pcr_threshold: 0.015
lambda_n_max: 3.2
lambda_p_max: 3.8
norm_preserve: true
norm_beta: 0.74
blend_tau: 0.76

# Generation parameters
max_new_tokens: 64
top_p: 1
temperature: 0.05

# Dataset config
pope_root: /path/to/DATA/POPE
coco_images: /path/to/DATA/val2014

# Output config
output_dir: /path/to/outputs/pope_llava
