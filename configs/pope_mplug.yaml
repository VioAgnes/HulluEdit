# ECSE POPE Evaluation Config (mPLUG-Owl2)
# Model config
model_name: mPLUG-Owl2
model_path: /path/to/mplug-owl2-llama2-7b
precision: fp16

# ECSE subspace parameters
anchor_layer: 26
visual_clean_layers: [10]
rank_evidence: 6
rank_prior: 3
kappa: 0.35
lambda_prior: 0.15
eps: 1.0e-6

# Robustification parameters
weight_temp: 1.8
vcr_floor: 0.06
pcr_ceiling: 0.95
pcr_threshold: 0.03
lambda_n_max: 2.0
lambda_p_max: 2.0
norm_preserve: true
norm_beta: 0.6
blend_tau: 0.7

# Generation parameters
max_new_tokens: 64
top_p: 1.0
temperature: 0.05

# Dataset config
pope_root: /path/to/POPE
coco_images: /path/to/coco/val2014

# Output config
output_dir: /path/to/outputs/pope_mplug
